<!-- Trang lỗi chung: 403, 404, 500... -->
{{define "title"}}Lỗi{{end}}
{{define "content"}}
<div class="error-container">
    <div style="text-align: center; color: var(--error); margin-bottom: 24px;">
        <svg fill="none" height="80" viewBox="0 0 24 24" width="80" stroke="currentColor">
            <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
        </svg>
    </div>
    <h1>{{.Code}}</h1>
    <p>{{.Message}}</p>
    <a href="/login" class="google-btn" style="background: var(--primary); color: #fff; text-decoration: none;">
        Quay lại trang đăng nhập
    </a>
</div>
{{end}}
